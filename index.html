<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Krv Labs × Argenx — Why filtering fails</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=IBM+Plex+Sans:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
          "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm",
          "simplex-noise": "https://cdn.jsdelivr.net/npm/simplex-noise@4.0.3/+esm"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="stage" aria-hidden="true"></canvas>
    <div id="boot-status">Loading animation…</div>

    <script>
      window.addEventListener("error", (event) => {
        const node = document.getElementById("boot-status");
        if (!node) return;
        const msg = event?.message || "Unknown error";
        node.textContent = `Animation error: ${msg}`;
        node.style.display = "block";
        node.classList.add("boot-error");
      });
      window.addEventListener("unhandledrejection", (event) => {
        const node = document.getElementById("boot-status");
        if (!node) return;
        const reason = event?.reason?.message || String(event?.reason || "Unhandled rejection");
        node.textContent = `Animation error: ${reason}`;
        node.style.display = "block";
        node.classList.add("boot-error");
      });
    </script>

    <div id="overlay" aria-live="polite">
      <div class="safe-area-guide" id="safe-area-guide" aria-hidden="true"></div>
      <div class="brand">
        <span class="brand-mark">Krv Labs</span>
        <span class="brand-x">×</span>
        <span class="brand-mark brand-argenx">argenx</span>
      </div>

      <div class="caption" id="caption">
        <div class="caption-eyebrow" id="eyebrow"></div>
        <div class="caption-title" id="title"></div>
        <div class="caption-sub" id="sub"></div>
      </div>

      <div class="stats" id="stats">
        <div class="stat" data-key="found">
          <div class="stat-label">Candidates found</div>
          <div class="stat-value" id="stat-found">—</div>
        </div>
        <div class="stat" data-key="noise">
          <div class="stat-label">False positives to review</div>
          <div class="stat-value" id="stat-noise">—</div>
        </div>
        <div class="stat" data-key="time">
          <div class="stat-label">Clinician time</div>
          <div class="stat-value" id="stat-time">—</div>
        </div>
      </div>

      <div class="callouts" id="callouts"></div>

      <div class="hud" id="hud">
        <span class="hud-scene" id="hud-scene">1 / 5</span>
        <span class="hud-progress"><span id="hud-progress-fill"></span></span>
        <span class="hud-hint">space/→ next · ← prev · R reset · A autoplay · P pause · F fullscreen · G guides</span>
      </div>

      <div class="controls" id="controls">
        <button class="control-btn" id="btn-prev" type="button">Prev</button>
        <button class="control-btn control-btn-primary" id="btn-play" type="button">Play</button>
        <button class="control-btn" id="btn-next" type="button">Next</button>
        <button class="control-btn" id="btn-reset" type="button">Reset</button>
      </div>

      <div class="tagline" id="tagline">
        Krv Labs × Pulsar — patient discovery that learns with you.
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
