<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Erdos Methods Overview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/demo-gallery.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#gallery" aria-label="Pulsar demo gallery">
          P<span>u</span>lsar<strong>.</strong>
        </a>
        <div class="topbar__meta">
          <span id="modeLabel">Demo gallery</span>
          <span id="stepLabel">Choose a graphic</span>
        </div>
        <div class="topbar__actions" aria-label="Export controls">
          <button
            id="btnSvg"
            class="tool-button"
            type="button"
            title="Download SVG screenshot"
          >
            <span class="tool-button__icon" aria-hidden="true">S</span>
            <span>SVG</span>
          </button>
          <button
            id="btnRecord"
            class="tool-button tool-button--strong"
            type="button"
            title="Record this graphic"
          >
            <span class="tool-button__icon" aria-hidden="true">R</span>
            <span>Record</span>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="viewer" aria-label="Selected demo">
          <div id="demoView" class="demo-view">
            <aside class="narrative-panel">
              <div id="demoKicker" class="eyebrow">Select a demo</div>
              <h2 id="demoTitle">Pulsar graphics gallery</h2>
              <p id="demoBody">
                Choose a graphic from the gallery, then step it, tune it, export
                an SVG, or record a short motion clip.
              </p>
              <div id="demoMetrics" class="metric-grid"></div>
              <div id="demoControls" class="control-stack"></div>
              <div id="demoCitations" class="narrative-citations" hidden></div>
            </aside>

            <div class="stage-wrap">
              <div id="stageHost" class="stage-host"></div>
              <div class="stage-toolbar" aria-label="Playback controls">
                <div class="stage-toolbar__nav">
                  <button id="btnPrev" class="nav-button" type="button">
                    Prev
                  </button>
                  <button
                    id="btnNext"
                    class="nav-button nav-button--primary"
                    type="button"
                  >
                    Next
                  </button>
                </div>
                <div id="dotContainer" class="dot-container"></div>
                <div id="stageNum" class="stage-num">01</div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <section class="phone-blocker" aria-labelledby="phoneBlockerTitle">
      <div class="phone-blocker__panel">
        <div class="brand phone-blocker__brand" aria-label="Pulsar">
          P<span>u</span>lsar<strong>.</strong>
        </div>
        <div class="eyebrow">Desktop required</div>
        <h1 id="phoneBlockerTitle">Phones aren't supported.</h1>
        <p>Open this briefing on a computer.</p>
      </div>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
